        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #16161f;
            --bg-card-hover: #1e1e2a;
            --border: #2a2a3a;
            --border-hover: #3a3a5a;
            --text-primary: #f0f0f5;
            --text-secondary: #9090a0;
            --text-muted: #606070;
            --accent-python: #6366f1;
            --accent-python-light: #818cf8;
            --accent-gold: #fbbf24;
            --accent-green: #34d399;
            --accent-red: #f87171;
            --accent-cyan: #22d3ee;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            --font-sans: 'Inter', -apple-system, sans-serif;
            --radius: 12px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            padding: 80px 0 60px;
            text-align: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--accent-python-light);
            margin-bottom: 24px;
            font-family: var(--font-mono);
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .avatar-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 24px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--bg-card);
            box-shadow: 0 0 0 2px var(--accent-python);
        }

        .avatar-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: conic-gradient(var(--accent-python), var(--accent-gold), var(--accent-green), var(--accent-python));
            z-index: -1;
            animation: rotate 8s linear infinite;
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        h1 span {
            background: linear-gradient(135deg, var(--accent-python), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 32px;
            font-weight: 400;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .social-links a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .social-links a:hover {
            border-color: var(--accent-python);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .social-links img {
            width: 18px;
            height: 18px;
        }

        /* WeChat Float Button */
        .wechat-btn {
            position: fixed;
            right: 16px;
            bottom: 24px;
            z-index: 1000;
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #07C160, #10B981);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(7, 193, 96, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .wechat-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(7, 193, 96, 0.5);
        }

        .wechat-btn img {
            width: 28px;
            height: 28px;
        }

        /* QR Code Modal */
        .qrcode-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .qrcode-overlay.active {
            display: flex;
        }

        .qrcode-modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .qrcode-img {
            width: 180px;
            height: 180px;
            border-radius: var(--radius-sm);
            margin-bottom: 12px;
        }

        .qrcode-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin: 0;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin: 60px 0;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            font-family: var(--font-mono);
            margin-bottom: 4px;
        }

        .stat-value.projects { color: var(--accent-python); }
        .stat-value.stars { color: var(--accent-gold); }
        .stat-value.forks { color: var(--accent-cyan); }
        .stat-value.years { color: var(--accent-green); }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Projects Section */
        .projects-section {
            padding: 40px 0 80px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .section-title span {
            color: var(--text-muted);
            font-weight: 400;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--accent-python);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .project-card:hover {
            border-color: var(--border-hover);
            background: var(--bg-card-hover);
            transform: translateX(4px);
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-top {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 16px;
        }

        .project-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }

        .project-icon.python {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
        }

        .project-icon.java {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .project-icon.html {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .project-icon.markdown {
            background: linear-gradient(135deg, #6b7280, #4b5563);
        }

        .project-icon.xslt {
            background: linear-gradient(135deg, #f97316, #ea580c);
        }

        .project-info {
            flex: 1;
            min-width: 0;
        }

        .project-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .project-name a {
            color: var(--text-primary);
            text-decoration: none;
        }

        .project-name a:hover {
            color: var(--accent-python-light);
        }

        .project-lang {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
            padding: 2px 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        .project-description {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .project-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .project-stats {
            display: flex;
            gap: 20px;
        }

        .project-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        .project-stat img {
            width: 16px;
            height: 16px;
            opacity: 0.6;
        }

        .project-link {
            font-size: 0.85rem;
            color: var(--accent-python);
            text-decoration: none;
            font-family: var(--font-mono);
            opacity: 0;
            transform: translateX(-8px);
            transition: all 0.3s ease;
        }

        .project-card:hover .project-link {
            opacity: 1;
            transform: translateX(0);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
        }

        footer a {
            color: var(--accent-python);
            text-decoration: none;
        }

        /* Responsive */
        @media (min-width: 640px) {
            .stats {
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;
            }

            .projects-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
        }

        @media (min-width: 1024px) {
            .projects-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 24px;
            }
        }

        /* Animations */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card:nth-child(1) { animation: fadeIn 0.5s ease 0.1s forwards; opacity: 0; }
        .stat-card:nth-child(2) { animation: fadeIn 0.5s ease 0.15s forwards; opacity: 0; }
        .stat-card:nth-child(3) { animation: fadeIn 0.5s ease 0.2s forwards; opacity: 0; }
        .stat-card:nth-child(4) { animation: fadeIn 0.5s ease 0.25s forwards; opacity: 0; }

        @media (hover: none) {
            .project-card:hover {
                transform: none;
            }

            .project-link {
                opacity: 1;
                transform: none;
            }
        }
    </style>
</head>

                url: 'https://github.com/joe-qai/UIUX-Pro-Max-CN'
            },
            {
                name: 'CucumberDriver',
                description: 'Selenium 与 Cucumber 行为驱动测试框架，支持 BDD 风格的自动化测试。',
                language: 'HTML',
                stars: 0,
                forks: 0,
                url: 'https://github.com/joe-qai/CucumberDriver'
            },
            {
                name: 'SpareFoodShare',
                description: '基于 Django 的公益项目，用于分享剩余食物、减少食物浪费，促进社区互助共享。',
                language: 'HTML',
                stars: 0,
                forks: 0,
                url: 'https://github.com/joe-qai/SpareFoodShare'
            },
            {
                name: 'build-your-own-x',
                description: '通过从零开始重建您喜欢的技术来掌握编程，深入理解底层原理和实现机制。',
                language: 'Markdown',
                stars: 0,
                forks: 0,
                url: 'https://github.com/joe-qai/build-your-own-x'
            }
        ];

        const getLanguageIcon = (lang) => {
            const icons = {
                'Python': '🐍',
                'Java': '☕',
                'HTML': '🌐',
                'Markdown': '📝',
                'XSLT': '📊'
            };
            return icons[lang] || '📦';
        };

        const getLanguageClass = (lang) => {
            const classes = {
                'Python': 'python',
                'Java': 'java',
                'HTML': 'html',
                'Markdown': 'markdown',
                'XSLT': 'xslt'
            };
            return classes[lang] || '';
        };

        const renderProjects = () => {
            const grid = document.getElementById('projects-grid');
            projects.forEach((project, index) => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.style.animation = `fadeIn 0.5s ease ${index * 0.05 + 0.3}s forwards`;
                card.style.opacity = '0';
                card.innerHTML = `
                    <div class="project-top">
                        <div class="project-icon ${getLanguageClass(project.language)}">
                            ${getLanguageIcon(project.language)}
                        </div>
                        <div class="project-info">
                            <div class="project-name">
                                <a href="${project.url}" target="_blank">${project.name}</a>
                                <span class="project-lang">${project.language}</span>
                            </div>
                        </div>
                    </div>
                    <p class="project-description">${project.description}</p>
                    <div class="project-bottom">
                        <div class="project-stats">
                            <span class="project-stat">
                                <img src="https://cdn-icons-png.flaticon.com/512/1161/1161281.png" alt="Stars">
                                ${project.stars}
                            </span>
                            <span class="project-stat">
                                <img src="https://cdn-icons-png.flaticon.com/512/1161/1161330.png" alt="Forks">
                                ${project.forks}
                            </span>
                        </div>
                        <a href="${project.url}" target="_blank" class="project-link">View →</a>
                    </div>
                `;
                card.onclick = (e) => {
                    if (e.target.tagName !== 'A') {
                        window.open(project.url, '_blank');
                    }
                };
                grid.appendChild(card);
            });
        };

        document.addEventListener('DOMContentLoaded', () => {
            renderProjects();
            
            // WeChat QR Code Modal
            const wechatBtn = document.getElementById('wechatBtn');
            const qrcodeOverlay = document.getElementById('qrcodeOverlay');
            const qrcodeModal = document.querySelector('.qrcode-modal');

            wechatBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                qrcodeOverlay.classList.add('active');
            });

            qrcodeOverlay.addEventListener('click', (e) => {
                if (e.target === qrcodeOverlay) {
                    qrcodeOverlay.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
